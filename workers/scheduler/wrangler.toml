# Scheduler Worker 設定
#
# 背景: スヌーズと送信予約を CF Cron Triggers + KV で実現する。
# GCP のスケジューラーサービスを使わず、Cloudflare 内で完結。
# 毎分 Cron が走り、期限が来たジョブを処理する。

name = "vantagemail-scheduler"
main = "src/index.ts"
compatibility_date = "2025-03-15"

# 毎分チェック: 期限が来たスヌーズ/送信予約を処理
[triggers]
crons = ["* * * * *"]

# KV: スケジュールされたジョブを保存
[[kv_namespaces]]
binding = "SCHEDULED_JOBS"
id = ""  # wrangler kv namespace create で発行されたIDを設定

[vars]
# push-relay Worker の URL（スヌーズ復帰通知の送信先）
PUSH_RELAY_URL = "https://vantagemail-push-relay.workers.dev"
