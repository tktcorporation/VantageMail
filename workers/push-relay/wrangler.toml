# Push Relay Worker 設定
#
# 背景: Gmail Pub/Sub プッシュ通知を受信し、Durable Objects 経由で
# WebSocket クライアントにファンアウトする。GCP は Pub/Sub トピック1個のみ使用し、
# push subscription の宛先をこの Worker にすることで、それ以降は全て CF 内で完結する。

name = "vantagemail-push-relay"
main = "src/index.ts"
compatibility_date = "2025-03-15"

[vars]
ALLOWED_ORIGINS = "http://localhost:5173,https://vantagemail.pages.dev"

[durable_objects]
bindings = [
  { name = "PUSH_CONNECTIONS", class_name = "PushConnectionManager" }
]

[[migrations]]
tag = "v1"
new_classes = ["PushConnectionManager"]

# KV: アカウントごとの historyId を保存（インクリメンタル同期の起点）
[[kv_namespaces]]
binding = "SYNC_STATE"
id = ""  # wrangler kv namespace create で発行されたIDを設定
