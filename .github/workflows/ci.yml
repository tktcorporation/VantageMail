name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Knip (unused code detection)
        run: pnpm run knip

      - name: Test (core)
        run: pnpm --filter @vantagemail/core run test

      - name: Test (ui)
        run: pnpm --filter @vantagemail/ui run test

      - name: Build
        run: pnpm run build
