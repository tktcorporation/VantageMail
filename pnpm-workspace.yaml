packages:
  - "packages/*"
  - "apps/*"
  - "workers/*"

catalogMode: prefer

catalog:
  "@types/node": ^22
  "@types/react": ^19
  "@types/react-dom": ^19
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vite-plus: latest
  react: ^19.1.0
  react-dom: ^19.1.0
  zustand: ^5.0.3

overrides:
  vite: "catalog:"
  vitest: "catalog:"

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
