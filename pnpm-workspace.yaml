packages:
  - "packages/*"
  - "apps/*"
  - "workers/*"

catalog:
  '@tailwindcss/vite': ^4.2.2
  "@types/node": ^22
  "@types/react": ^19
  "@types/react-dom": ^19
  react: ^19.1.0
  react-dom: ^19.1.0
  tailwindcss: ^4.2.2
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  zustand: ^5.0.3

catalogMode: prefer

overrides:
  vite: "catalog:"
  vitest: "catalog:"

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
